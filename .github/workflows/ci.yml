name: CI - Lint, Tests & Docker Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint (Checkstyle)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run linter (Checkstyle)
        run: ./mvnw checkstyle:check

  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests
        run: ./mvnw test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test # Docker build need tests to pass
    if: github.base_ref == 'develop' || github.base_ref == 'main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --file Dockerfile \
            --tag bucket-adapter:latest \
            --progress=plain \