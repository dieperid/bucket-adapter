name: CI - Lint, SpotBugs, Tests & Docker Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Run Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Run linter (Checkstyle)
        run: ./mvnw checkstyle:check
        continue-on-error: true

  spotbugs:
    name: Run SpotBugs
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Run SpotBugs
        run: ./mvnw spotbugs:check

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: spotbugs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Run tests
        run: ./mvnw test
