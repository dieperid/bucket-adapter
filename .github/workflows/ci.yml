name: CI - Lint & Tests

on:
  push:
    branches:
      - feature/**
      - release/**
      - hotfix/**
  pull_request:

jobs:
  build:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run linter (Checkstyle)
        run: ./mvnw checkstyle:check

      - name: Run tests
        run: ./mvnw test
